<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <section class="calculator">
        <input type="text" name="number-ouput" value="1" readonly>
        <section class="operations-numbers">
            <button class="clear operator">AC</button>
            <button class="delete operator">DE</button>
            <button class="period operator">.</button>
            <button class="divide operator">/</button>
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="multiply operator">x</button>
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="subtract operator">-</button>
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="add operator">+</button>
            <article class="bottom-operations">
                <button class="number">00</button>
                <button class="number">0</button>
                <button class="equal operator">=</button>
            </article>
        </section>
    </section>
</body>
</html>
